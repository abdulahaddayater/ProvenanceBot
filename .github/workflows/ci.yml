name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Test (Node workspaces)
        run: pnpm test

  contracts:
    name: Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check contracts
        working-directory: contracts
        run: cargo check -p provenance

      - name: Build wasm
        working-directory: contracts
        run: cargo build --release --target wasm32v1-none -p provenance
