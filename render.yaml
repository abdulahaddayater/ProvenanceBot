services:
  - type: web
    name: provenancebot-agents
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @provenancebot/agents build
    startCommand: pnpm --filter @provenancebot/agents start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HOST
        value: 0.0.0.0
      - key: SOROBAN_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_NETWORK_PASSPHRASE
        value: Test SDF Network ; September 2015
      - key: PROVENANCE_CONTRACT_ID
        value: CAB2CE4EYPPZ6WKNVNBR3OM2AQETZFUISXDV2AJATYZTWCTMJ64EHP32
      - key: CORS_ORIGIN
        sync: false
      - key: STELLAR_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
